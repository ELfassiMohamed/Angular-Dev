<main class="shell">
  <section class="panel">
    <p class="eyebrow">Jarvis</p>
    <h1>Voice assistant interface</h1>

    <div class="stage">
      <div
        class="pulse-ring"
        [style.opacity]="ringOpacity()"
        [style.transform]="'translate(-50%, -50%) scale(' + orbScale() + ')'"
      ></div>

      <div
        class="core"
        [class.core-active]="isListening()"
        [style.transform]="'scale(' + orbScale() + ')'"
      >
        <div class="core-glow"></div>
        <span class="core-label">{{ levelPercent() }}%</span>
      </div>
    </div>

    <div class="status-row">
      <span class="status-dot" [class.status-dot-active]="isListening()"></span>
      <span>{{ statusLabel() }}</span>
      <span *ngIf="speechSupported() && isListening()" class="status-pill">
        {{ isTranscribing() ? 'Transcribing' : 'Mic live' }}
      </span>
      <span *ngIf="!speechSupported() && isListening()" class="status-pill warning">
        Speech-to-text not supported
      </span>
    </div>

    <div class="transcript" [class.transcript-active]="isListening()">
      <p class="transcript-label">Live transcript</p>
      <p class="transcript-text">
        {{ transcript() || (isListening() ? 'Speak to see text appear here.' : 'Start listening to begin.') }}
      </p>
    </div>

    <button
      type="button"
      class="control"
      (click)="toggleListening()"
      [disabled]="isStarting() || !isBrowser()"
    >
      {{ isListening() ? 'Stop listening' : isStarting() ? 'Starting...' : 'Start listening' }}
    </button>
  </section>
</main>
