<main class="demo-shell">
  <div class="widget-root" [ngStyle]="widgetStyles()">
    @if (isOpen()) {
      <section class="chat-window">
        <header class="chat-header">
          <div class="header-gradient"></div>

          <div class="header-content">
            <div class="agent-heading">
              <div class="avatar-wrap">
                <img class="avatar-image" [src]="assistant().avatar" [alt]="assistant().name" />
                <span
                  class="status-indicator"
                  [class.status-busy]="assistant().status === 'busy'"
                  [class.status-offline]="assistant().status === 'offline'"
                ></span>
              </div>

              <div>
                <h1>{{ assistant().name }}</h1>
                <p>{{ assistant().role }}</p>
              </div>
            </div>

            <button
              type="button"
              class="icon-button ghost-button"
              (click)="toggleOpen()"
              aria-label="Close chat"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
              </svg>
            </button>
          </div>
        </header>

        <section class="message-area" #messageArea>
          @for (message of messages(); track trackByMessageId($index, message)) {
            <div class="message-row" [class.message-row-user]="message.role === 'user'">
              <img
                class="message-avatar"
                [src]="message.role === 'bot' ? assistant().avatar : 'https://github.com/shadcn.png'"
                [alt]="message.role === 'bot' ? assistant().name : 'You'"
              />

              <div class="message-stack" [class.message-stack-user]="message.role === 'user'">
                <span class="message-label">
                  {{ message.role === 'bot' ? assistant().name : 'You' }}
                </span>
                <div class="message-bubble" [class.message-bubble-user]="message.role === 'user'">
                  <p>{{ message.text }}</p>
                </div>
              </div>
            </div>
          }

          @if (isBotTyping()) {
            <div class="message-row">
              <img class="message-avatar" [src]="assistant().avatar" [alt]="assistant().name" />
              <div class="message-stack">
                <div class="message-bubble typing-bubble">
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
              </div>
            </div>
          }
        </section>

        <footer class="input-panel">
          <form class="input-form" (ngSubmit)="sendTextMessage()">
            <input
              type="text"
              name="message"
              autocomplete="off"
              [ngModel]="draftMessage()"
              (ngModelChange)="setDraftMessage($event)"
              [placeholder]="inputPlaceholder()"
            />

            <button
              type="submit"
              class="icon-button send-button"
              [disabled]="!draftMessage().trim()"
              aria-label="Send message"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M22 2 11 13"></path>
                <path d="m22 2-7 20-4-9-9-4 20-7Z"></path>
              </svg>
            </button>
          </form>
        </footer>
      </section>
    }

    <button
      type="button"
      class="toggle-button"
      [class.toggle-button-open]="isOpen()"
      (click)="toggleOpen()"
      [attr.aria-label]="isOpen() ? 'Close chat widget' : 'Open chat widget'"
    >
      @if (isOpen()) {
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 10h10"></path>
          <path d="M7 14h7"></path>
          <path d="M5 19V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-4 4Z"></path>
        </svg>
      }
    </button>
  </div>
</main>
